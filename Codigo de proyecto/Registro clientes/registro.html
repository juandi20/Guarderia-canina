<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paraiso Canino</title>
    <link rel="stylesheet" href="style-registro.css">
</head>
<body>
    <div class="contenedor-principal">
        
        <div class="izquierda"></div> 

        <div class="derecha">
            <div class="contenedor">
                <h2>Registro de cliente</h2>
                <form id="formulario-usuario">
                    <input type="text" id="nombre" name="nombre" placeholder="Nombre Completo" required>
                    <input type="text" id="documento" name="identificacion" placeholder="N° de Documento" required>
                    <input type="text" id="ciudad" name="ciudad" placeholder="Ciudad" required>
                    <input type="text" id="direccion" name="direccion" placeholder="Direccion" required>
                    <input type="text" id="celular" name="celular" inputmode="numeric" pattern="\d*" placeholder="Celular" required>
                    <input type="email" id="email" name="email" placeholder="Correo electrónico" required>
                    <input type="password" id="contraseña" name="contraseña" placeholder="Contraseña" required>
                    <input type="password" id="confirmar-contraseña" name="confirmar-contraseña" placeholder="Confirmar contraseña" required>
                    <input type="submit" value="Registrar">
                </form>
            </div>
        </div>
    </div>
</body>
</html>
